<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowOk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="10" y="10" width="1004" height="748" rx="24" fill="#ffffff" filter="url(#shadow)"/>

  <!-- title -->
  <text x="52" y="60" font-size="30" font-weight="800" fill="#0f172a">Multi-provider AI fallback</text>
  <text x="52" y="90" font-size="16" fill="#64748b">One slow, rate-limited, or down provider can never take the app offline.</text>

  <!-- input -->
  <rect x="402" y="116" width="220" height="48" rx="24" fill="#0f172a"/>
  <text x="512" y="140" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Your speech</text>
  <text x="512" y="157" font-size="10.5" fill="#cbd5e1" text-anchor="middle">transcript + delivery</text>
  <line x1="512" y1="164" x2="512" y2="184" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Card 1: Cerebras -->
  <rect x="132" y="186" width="760" height="84" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="164" y="222" font-size="20" font-weight="800" fill="#9a3412">Cerebras</text>
  <text x="164" y="246" font-size="12.5" fill="#9a3412" opacity="0.8">fastest · primary</text>
  <rect x="624" y="211" width="240" height="34" rx="17" fill="#ffedd5"/>
  <text x="744" y="233" font-size="12" font-weight="700" fill="#9a3412" text-anchor="middle">Key 1 → Key 2 (backup)</text>
  <line x1="512" y1="270" x2="512" y2="292" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="540" y="287" font-size="11" fill="#94a3b8">if all keys fail ↓</text>

  <!-- Card 2: Groq -->
  <rect x="132" y="294" width="760" height="84" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="164" y="330" font-size="20" font-weight="800" fill="#9a3412">Groq</text>
  <text x="164" y="354" font-size="12.5" fill="#9a3412" opacity="0.8">fast · fallback</text>
  <rect x="624" y="319" width="240" height="34" rx="17" fill="#ffedd5"/>
  <text x="744" y="341" font-size="12" font-weight="700" fill="#9a3412" text-anchor="middle">Key 1 → Key 2 (backup)</text>
  <line x1="512" y1="378" x2="512" y2="400" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="540" y="395" font-size="11" fill="#94a3b8">if all keys fail ↓</text>

  <!-- Card 3: Gemini -->
  <rect x="132" y="402" width="760" height="84" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="164" y="438" font-size="20" font-weight="800" fill="#9a3412">Gemini</text>
  <text x="164" y="462" font-size="12.5" fill="#9a3412" opacity="0.8">fallback</text>
  <rect x="624" y="427" width="240" height="34" rx="17" fill="#ffedd5"/>
  <text x="744" y="449" font-size="12" font-weight="700" fill="#9a3412" text-anchor="middle">Key 1 → Key 2 (backup)</text>
  <line x1="512" y1="486" x2="512" y2="508" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="540" y="503" font-size="11" fill="#94a3b8">if all keys fail ↓</text>

  <!-- Card 4: OpenRouter -->
  <rect x="132" y="510" width="760" height="84" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="164" y="546" font-size="20" font-weight="800" fill="#9a3412">OpenRouter</text>
  <text x="164" y="570" font-size="12.5" fill="#9a3412" opacity="0.8">last resort · free tier</text>
  <rect x="624" y="535" width="240" height="34" rx="17" fill="#ffedd5"/>
  <text x="744" y="557" font-size="12" font-weight="700" fill="#9a3412" text-anchor="middle">Key 1 → Key 2 (backup)</text>
  <line x1="512" y1="594" x2="512" y2="616" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowOk)"/>

  <!-- output -->
  <rect x="302" y="618" width="420" height="58" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="512" y="645" font-size="16" font-weight="800" fill="#166534" text-anchor="middle">✓ Score + feedback</text>
  <text x="512" y="665" font-size="11.5" fill="#166534" text-anchor="middle">first provider that answers wins — usually under 2s</text>

  <!-- footnote -->
  <text x="52" y="724" font-size="12.5" fill="#64748b">Per-provider backup keys + 4 providers: the AI keeps working even if a key is rate-limited or a service goes down.</text>
</svg>
